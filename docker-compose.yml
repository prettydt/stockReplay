services:
  mysql:
    image: mysql:8.0
    container_name: stock_replay_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: stock_replay
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: stock_replay_web
    restart: unless-stopped
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ""
      MYSQL_DB: stock_replay
      TZ: Asia/Shanghai
    ports:
      - "5001:5001"
    depends_on:
      mysql:
        condition: service_healthy

  collector:
    build: .
    container_name: stock_replay_collector
    restart: unless-stopped
    command: ["python", "collector.py", "--all", "--interval", "3"]
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ""
      MYSQL_DB: stock_replay
      TZ: Asia/Shanghai
    volumes:
      - ./data:/app/data
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
